<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoetrope</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="mode-balls nmode-standalone">
  <canvas id="stage"></canvas>

  <div id="hud">
    <nav class="mode-pills" aria-label="Mode">
      <button class="mpill" data-mode="standalone">Standalone</button>
      <button class="mpill" data-mode="client">Client</button>
      <button class="mpill" data-mode="hosting">Hosting</button>
    </nav>
    <div id="transport">
      <div class="tabs">
        <button id="tab-balls" class="tab active" title="Ball patterns">Balls</button>
        <button id="tab-field" class="tab" title="Psychedelic field">Field</button>
      </div>
      <button id="btn-pl-start" class="balls-only" title="Start of playlist">|&lt;</button>
      <button id="btn-pat-start" class="balls-only" title="Start of current pattern">&lt;</button>
      <button id="btn-play" title="Play / Pause">▶</button>
      <button id="btn-next" class="balls-only" title="Next pattern">&gt;</button>
      <label class="speed balls-only">
        Speed
        <select id="speed">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>
      <span id="now-playing" class="balls-only"></span>

      <label class="ctl field-only">Speed
        <input type="number" id="field-speed-input" min="0" max="10" step="0.1">
      </label>
      <label class="ctl field-only">Palette
        <select id="field-palette-input">
          <option value="Happy">Happy</option>
          <option value="Calm">Calm</option>
          <option value="Neon">Neon</option>
          <option value="Fire">Fire</option>
          <option value="Ocean">Ocean</option>
        </select>
      </label>
      <label class="ctl field-only">Shape
        <select id="field-shape-input">
          <option value="circles">Circles</option>
          <option value="squares">Squares</option>
          <option value="diamonds">Diamonds</option>
          <option value="stripes">Stripes</option>
          <option value="spiral">Spiral</option>
          <option value="star">Star</option>
          <option value="random">Random</option>
        </select>
      </label>
      <label class="ctl checkbox field-only" title="Permute the palette so colors cycle in a new order">
        <input type="checkbox" id="field-shuffle-input"> Shuffle
      </label>
      <button id="field-shape-regen" class="regen field-only" title="Roll a new random shape / color order">🎲</button>
      <label class="ctl checkbox field-only" title="Continuously resolve to HD, hold, de-resolve, then re-resolve (rerolling random seeds each cycle)">
        <input type="checkbox" id="field-loop-input"> Loop
      </label>
      <label class="ctl field-only" title="Total length of one resolve-hold-deresolve cycle">Duration
        <input type="number" id="field-duration-input" min="3" max="120" step="1">
      </label>

      <button id="btn-fullscreen" title="Toggle fullscreen (F)">⛶</button>
      <button id="btn-toggle-editor" class="balls-only" title="Show/hide editor">⚙</button>
    </div>
  </div>

  <aside id="editor" class="hidden">
    <header>
      <div class="brand">
        <img src="icon.png" class="brand-mark" alt="">
        <div class="brand-name">Zoetrope</div>
      </div>
      <select id="add-pattern" class="balls-only" title="Add pattern">
        <option value="" disabled selected>+ Add…</option>
      </select>
    </header>
    <div class="global balls-only">
      <label>Background <input type="color" id="bg-color"></label>
      <label>Ball size <input type="number" id="ball-size" min="2" max="400" step="1"></label>
      <label>Speed <input type="number" id="speed-input" min="0" max="10" step="0.1"></label>
    </div>
    <div class="global linger-group balls-only">
      <span class="group-label">Linger</span>
      <label>Seconds <input type="number" id="linger-input" min="0" max="10" step="0.1"></label>
      <label title="How far the size pulse leads into adjacent motion (0 = pulse confined to dwell, 0.5 = wide anticipation)">
        Lead frac <input type="number" id="linger-lead-input" min="0" max="1" step="0.05">
      </label>
    </div>
    <ol id="playlist" class="balls-only"></ol>
    <footer>
      <button id="btn-save">Save</button>
      <button id="btn-revert">Revert</button>
      <span id="save-status"></span>
      <span id="version"></span>
    </footer>
  </aside>

  <template id="item-template">
    <li class="item">
      <div class="title-bar" title="Drag to reorder">
        <span class="pattern-name"></span>
        <button class="del" title="Remove">×</button>
      </div>
      <div class="row params">
        <input type="color" class="color">
        <label>Repeats <input type="number" class="repeats" min="1" max="100" step="1"></label>
        <label class="direction-wrap">Direction
          <select class="direction">
            <option value="cw">CW</option>
            <option value="ccw">CCW</option>
          </select>
        </label>
        <label class="angle-wrap">Angle°
          <input type="number" class="angle" min="0" max="359" step="1">
        </label>
      </div>
    </li>
  </template>

  <!-- Client-mode overlay: pill + leave button when in client mode. -->
  <div id="client-status">
    <span id="client-pill" data-state="connecting">Connecting…</span>
    <button id="btn-leave" title="End the session and return to standalone">Leave session</button>
  </div>

  <!-- Inline confirm overlay (Cancel / Switch). Hidden by default. -->
  <div id="confirm-overlay" hidden>
    <div class="confirm-card">
      <div class="confirm-message"></div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="ghost">Cancel</button>
        <button id="confirm-ok">Switch</button>
      </div>
    </div>
  </div>

  <!-- Join dialog -->
  <div id="join-dialog" class="dialog">
    <div class="dialog-card">
      <h3>Join a session</h3>
      <label class="dialog-field">Session URL
        <textarea id="join-url" rows="3" placeholder="zoetrope://join?ws=…#…" autocomplete="off"></textarea>
        <span class="dialog-hint">Paste the URL the practitioner sent you.</span>
      </label>
      <div class="dialog-actions">
        <button id="join-cancel" class="ghost">Cancel</button>
        <button id="join-confirm">Join</button>
      </div>
      <div id="join-error" class="dialog-error"></div>
    </div>
  </div>

  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
