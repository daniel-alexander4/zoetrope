<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoetrope</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="mode-balls">
  <canvas id="stage"></canvas>

  <div id="hud">
    <div id="transport">
      <div class="tabs">
        <button id="tab-balls" class="tab active" title="Ball patterns">Balls</button>
        <button id="tab-field" class="tab" title="Psychedelic field">Field</button>
      </div>
      <button id="btn-pl-start" class="balls-only" title="Start of playlist" aria-label="Start of playlist">|&lt;</button>
      <button id="btn-pat-start" class="balls-only" title="Start of current pattern" aria-label="Start of current pattern">&lt;</button>
      <button id="btn-play" title="Play / Pause" aria-label="Play or pause">▶</button>
      <button id="btn-next" class="balls-only" title="Next pattern" aria-label="Next pattern">&gt;</button>
      <label class="speed balls-only">
        Speed
        <select id="speed">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>
      <span id="now-playing" class="balls-only"></span>

      <label class="ctl field-only">Speed
        <input type="number" id="field-speed-input" min="0" max="10" step="0.1">
      </label>
      <label class="ctl field-only">Palette
        <select id="field-palette-input">
          <option value="Happy">Happy</option>
          <option value="Calm">Calm</option>
          <option value="Neon">Neon</option>
          <option value="Fire">Fire</option>
          <option value="Ocean">Ocean</option>
        </select>
      </label>
      <label class="ctl field-only">Shape
        <select id="field-shape-input">
          <option value="circles">Circles</option>
          <option value="squares">Squares</option>
          <option value="diamonds">Diamonds</option>
          <option value="stripes">Stripes</option>
          <option value="spiral">Spiral</option>
          <option value="star">Star</option>
          <option value="random">Random</option>
        </select>
      </label>
      <label class="ctl checkbox field-only" title="Permute the palette so colors cycle in a new order">
        <input type="checkbox" id="field-shuffle-input"> Shuffle
      </label>
      <button id="field-shape-regen" class="regen field-only" title="Roll a new random shape / color order" aria-label="Roll a new random shape and color order">🎲</button>
      <label class="ctl checkbox field-only" title="Continuously resolve to HD, hold, de-resolve, then re-resolve (rerolling random seeds each cycle)">
        <input type="checkbox" id="field-loop-input"> Loop
      </label>
      <label class="ctl field-only" title="Total length of one resolve-hold-deresolve cycle">Duration
        <input type="number" id="field-duration-input" min="3" max="120" step="1">
      </label>

      <button id="btn-fullscreen" title="Toggle fullscreen (F)" aria-label="Toggle fullscreen">⛶</button>
      <button id="btn-toggle-editor" class="balls-only" title="Show/hide editor" aria-label="Show or hide editor">⚙</button>
    </div>
  </div>

  <aside id="editor" class="hidden">
    <header>
      <div class="brand">
        <img src="icon.png" class="brand-mark" alt="">
        <div class="brand-name">Zoetrope</div>
      </div>
      <select id="add-pattern" class="balls-only" title="Add pattern">
        <option value="" disabled selected>+ Add…</option>
      </select>
    </header>
    <div id="readonly-banner" class="readonly-banner balls-only" hidden>
      Built-in playlist — Duplicate to make an editable copy.
    </div>
    <details class="globals-collapsible balls-only">
      <summary>Global settings</summary>
      <div class="global">
        <label>Background <input type="color" id="bg-color"></label>
        <label>Ball size <input type="number" id="ball-size" min="2" max="400" step="1"></label>
        <label>Speed <input type="number" id="speed-input" min="0" max="10" step="0.1"></label>
      </div>
      <div class="global linger-group">
        <span class="group-label">Linger</span>
        <label>Seconds <input type="number" id="linger-input" min="0" max="10" step="0.1"></label>
        <label title="How far the size pulse leads into adjacent motion (0 = pulse confined to dwell, 0.5 = wide anticipation)">
          Lead frac <input type="number" id="linger-lead-input" min="0" max="1" step="0.05">
        </label>
      </div>
      <div class="global" title="Label each gaze position on the canvas during position-sequence patterns. Off for live sessions; on while learning the grid.">
        <label>
          <input type="checkbox" id="show-position-labels"> Show position labels
        </label>
      </div>
      <div class="global" title="When on, Zoetrope checks GitHub for a newer release on startup and colors the version pill (green = current, red = update available). Off = no network calls at all.">
        <label>
          <input type="checkbox" id="update-check-input"> Check for updates
        </label>
      </div>
    </details>
    <div class="global library-row balls-only">
      <span class="group-label">Library</span>
      <select id="playlist-picker" title="Active playlist (the one that plays)"></select>
      <button id="lib-new" type="button" class="regen" title="New playlist" aria-label="New playlist">+</button>
      <button id="lib-rename" type="button" class="regen" title="Rename / recategorize" aria-label="Rename playlist">✎</button>
      <button id="lib-dup" type="button" class="regen" title="Duplicate" aria-label="Duplicate playlist">⎘</button>
      <button id="lib-del" type="button" class="regen danger" title="Delete playlist" aria-label="Delete playlist">🗑</button>
      <label class="checkbox lib-loop" title="Loop: cycle back to the first item after the last. Off: rewind to the start and stop."><input type="checkbox" id="lib-loop"> Loop</label>
    </div>
    <div id="library-edit" class="global library-edit balls-only hidden">
      <input type="text" id="lib-name" placeholder="Playlist name">
      <label>Category
        <select id="lib-category"></select>
      </label>
      <button id="lib-ok" type="button" class="regen">OK</button>
      <button id="lib-cancel" type="button" class="regen">Cancel</button>
    </div>
    <ol id="playlist" class="balls-only"></ol>
    <footer>
      <button id="btn-save">Save</button>
      <button id="btn-revert">Revert</button>
      <span id="save-status"></span>
      <button id="version" type="button" class="is-unknown" title="Version"></button>
      <span class="safety-note">For use with a qualified practitioner. Not a treatment in itself.</span>
    </footer>
  </aside>

  <template id="item-template">
    <li class="item">
      <div class="title-bar" title="Drag to reorder">
        <span class="pattern-name"></span>
        <button class="del danger" title="Remove" aria-label="Remove this pattern">×</button>
      </div>
      <div class="row params">
        <input type="color" class="color">
        <label>Repeats <input type="number" class="repeats" min="1" max="100" step="1"></label>
        <label title="Per-item speed on the 0–10 scale. Leave blank to follow the global speed; set a value to pin this item's speed regardless of the global dial.">Speed <input type="number" class="item-speed" min="0" max="10" step="0.1" placeholder="—"></label>
        <label class="direction-wrap">Direction
          <select class="direction">
            <option value="cw">CW</option>
            <option value="ccw">CCW</option>
          </select>
        </label>
        <label class="angle-wrap">Angle°
          <input type="number" class="angle" min="0" max="359" step="1">
        </label>
        <label class="serpentine-wrap">Round
          <input type="number" class="corner-radius" min="0" max="1" step="0.05">
        </label>
        <label class="serpentine-wrap">Start
          <select class="start-corner">
            <option value="tl">TL</option>
            <option value="tr">TR</option>
          </select>
        </label>
        <label class="lanes-wrap">Lanes
          <input type="number" class="lanes" min="2" max="8" step="1">
        </label>
        <label class="lightbulbs-wrap" title="Bulb size — how large the loops at each turn are.">Bulb
          <input type="number" class="bulb-size" min="0" max="1" step="0.05">
        </label>
        <label class="iemt-wrap iemt-name-wrap" title="Custom label for this position-sequence card, so you can tell multiple sequences apart in the editor and now-playing.">Name
          <input type="text" class="iemt-name" placeholder="(custom label)">
        </label>
        <label class="iemt-wrap">Dwell s
          <input type="number" class="dwell-sec" min="0.1" max="10" step="0.1">
        </label>
        <label class="iemt-wrap" title="Smooth-pursuit transit between positions. Set to 0 for instant jumps (saccade training).">Transit s
          <input type="number" class="transit-sec" min="0" max="10" step="0.1">
        </label>
      </div>
      <div class="row iemt-wrap iemt-steps-row">
        <ol class="step-list"></ol>
        <select class="add-step"></select>
      </div>
    </li>
  </template>

  <!-- Inline confirm overlay (Cancel / Switch). Hidden by default. -->
  <div id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-overlay-msg" hidden>
    <div class="confirm-card">
      <div id="confirm-overlay-msg" class="confirm-message"></div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="ghost">Cancel</button>
        <button id="confirm-ok">Switch</button>
      </div>
    </div>
  </div>

  <script src="modal.js"></script>
  <script src="editor.js"></script>
  <script src="patterns.js"></script>
  <script src="app.js"></script>
</body>
</html>
